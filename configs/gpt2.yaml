task_name: "test_gpt2_sample_10_pt"
resume: true

paths:
  input:
    raw_data_dir: "./datas_original"
  output:
    base_dir: "./work"

steps:
  00_preprocess:
    enabled: true
    script: "scripts/00_preprocess.py"
    output_csv: "intermediate/all_sentences.csv"
    min_sentence_len: 3
    remove_speaker_prefix: true
    split_by_punct: false

  01_compute_sentence_nll:
    enabled: true
    script: "scripts/01_compute_sentence_nll.py"
    input_csv: "intermediate/all_sentences.csv"
    output_csv: "intermediate/sentence_nll.csv"
    model_name: "./models/gpt2-chinese-cluecorpussmall"   # 或 "uer/gpt2-chinese-cluecorpussmall"
    batch_size: 128
    max_seq_len: 256
    gpu_ids: [6,7]          # 根据您的GPU编号调整
    num_workers: 4
    sample_ratio: 0.1      # 采样比例，1.0 表示全量
    sample_seed: 42        # 随机种子，保证每次采样一致

  02_filter_high_nll:
    enabled: true
    script: "scripts/02_filter_high_nll.py"
    input_csv: "intermediate/sentence_nll.csv"
    output_csv: "intermediate/high_nll_sentences.csv"
    threshold_percentile: 80
    min_sentence_len: 10

  03_compute_word_nll:
    enabled: true
    script: "scripts/03_compute_word_nll.py"
    input_csv: "intermediate/high_nll_sentences.csv"
    output_csv: "outputs/word_nll_details.csv"
    model_name: "./models/gpt2-chinese-cluecorpussmall"
    max_seq_len: 512
    batch_size: 64
    gpu_ids: [7]          # 只使用一张卡

  04_statistics:
    enabled: true
    script: "scripts/04_statistics.py"
    input_word_csv: "outputs/word_nll_details.csv"
    input_sentence_csv: "intermediate/sentence_nll.csv"
    output_dir: "outputs/report"
    top_k_suspicious_words: 30
    min_occurrence: 3
    generate_plots: true