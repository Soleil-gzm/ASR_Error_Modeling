task_name: "asr_error_analysis_v1"       # 任务标识，用于创建工作区子目录
resume: true                             # 是否启用断点续跑

paths:
  input:
    raw_data_dir: "./datas/original"     # 包含多层子目录的txt文件根目录
  output:
    base_dir: "./work"                   # 所有任务的工作根目录
    models_cache: "./models"             # 预训练模型缓存目录

steps:
  00_preprocess:
    enabled: true
    script: "scripts/00_preprocess.py"
    output_csv: "intermediate/all_sentences.csv"   # 相对task_dir
    min_sentence_len: 3                   # 过滤过短句子
    remove_speaker_prefix: true           # 去掉行首“说话人X:”

  01_compute_sentence_nll:
    enabled: true
    script: "scripts/01_compute_sentence_nll.py"
    input_csv: "intermediate/all_sentences.csv"
    output_csv: "intermediate/sentence_nll.csv"
    model_name: "uer/gpt2-chinese-cluecorpussmall"
    batch_size: 64                        # GPU批大小
    max_seq_len: 512
    use_gpu: true
    gpu_ids: [0, 1]                       # 使用两块GPU（数据并行）

  02_filter_high_nll:
    enabled: true
    script: "scripts/02_filter_high_nll.py"
    input_csv: "intermediate/sentence_nll.csv"
    output_csv: "intermediate/high_nll_sentences.csv"
    threshold_percentile: 95              # 取NLL最高的前5%
    min_sentence_len: 5                   # 进一步过滤短句

  03_compute_word_nll:
    enabled: true
    script: "scripts/03_compute_word_nll.py"
    input_csv: "intermediate/high_nll_sentences.csv"
    output_csv: "outputs/word_nll_details.csv"   # 将写入带时间戳的outputs子目录
    model_name: "uer/gpt2-chinese-cluecorpussmall"
    batch_size: 32
    use_gpu: true

  04_statistics:
    enabled: true
    script: "scripts/04_statistics.py"
    input_word_csv: "outputs/word_nll_details.csv"
    input_sentence_csv: "intermediate/sentence_nll.csv"
    output_dir: "outputs/report"
    patterns:
      - name: "digit_error"
        regex: "\\d"
        min_nll_threshold: 5.0
      - name: "punctuation_error"
        regex: "[，。！？；：]"
      - name: "repetition"
        regex: "(.)\\1{2,}"              # 三个以上重复字符
    top_k_suspicious_words: 30
    generate_plots: true

logging:
  level: "INFO"                          # 控制台INFO，文件DEBUG